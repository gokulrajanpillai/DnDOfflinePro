name: Create Release

# Trigger by pushing a version tag: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Create draft GitHub Release
        # Creates a draft so the developer can attach the binary ZIP before publishing.
        # The deploy-itch workflow fires when the release is published (not drafted).
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "DnD Offline Pro v${{ env.VERSION }}" \
            --generate-notes \
            --draft
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.24"

      - name: Deploy updated spaces/ to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
        run: python scripts/deploy_hf_space.py

      - name: Print next steps
        run: |
          echo "## Release v${{ env.VERSION }} drafted" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next steps to publish:**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Package the binary locally:" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "   bash scripts/package_release.sh ${{ env.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```' >> "$GITHUB_STEP_SUMMARY"
          echo "2. Attach the ZIP to the draft release:" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "   gh release upload ${{ github.ref_name }} release/DnDOfflinePro-v${{ env.VERSION }}-linux.zip" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```' >> "$GITHUB_STEP_SUMMARY"
          echo "3. Publish the release (triggers itch.io deploy + announcements):" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "   gh release edit ${{ github.ref_name }} --draft=false" >> "$GITHUB_STEP_SUMMARY"
          echo '   ```' >> "$GITHUB_STEP_SUMMARY"
