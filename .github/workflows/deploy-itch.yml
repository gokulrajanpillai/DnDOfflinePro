name: Deploy to itch.io

# Fires on every push to main and when a release is published.
# Builds a source ZIP from the repo and uploads it with butler.
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build source ZIP
        id: zip
        run: |
          ZIP_NAME="DnDOfflinePro-${{ steps.ver.outputs.value }}-source.zip"
          git archive --format=zip \
            --prefix=DnDOfflinePro/ \
            --output="$ZIP_NAME" \
            HEAD \
            -- src/ scenarios/ docs/ requirements.txt \
               tools_fetch_model.py README.md LICENSE
          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "Packaged: $ZIP_NAME ($(du -sh "$ZIP_NAME" | cut -f1))"

      - name: Install butler
        run: |
          curl -fsSL -L -o butler.zip \
            "https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip"
          unzip -q butler.zip
          chmod +x butler
          echo "$PWD" >> "$GITHUB_PATH"
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push "${{ steps.zip.outputs.name }}" \
            "${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:source" \
            --userversion "${{ steps.ver.outputs.value }}"

      - name: Summary
        run: |
          echo "## itch.io deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version **${{ steps.ver.outputs.value }}** pushed to \`${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:source\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View: https://${{ vars.ITCH_USER }}.itch.io/${{ vars.ITCH_GAME }}" >> "$GITHUB_STEP_SUMMARY"
