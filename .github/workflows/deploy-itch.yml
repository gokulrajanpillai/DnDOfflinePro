name: Deploy to itch.io

# Fires when a GitHub Release is published (not just drafted).
# The release must have the binary ZIP attached as a release asset.
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download release asset (binary ZIP)
        run: |
          mkdir -p release
          gh release download "${{ github.ref_name }}" \
            --pattern "*.zip" \
            --dir release/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install butler
        run: |
          curl -fsSL -o butler.zip \
            "https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default"
          unzip -q butler.zip
          chmod +x butler
          echo "$PWD" >> "$GITHUB_PATH"
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ZIP=$(ls release/*.zip | head -1)
          echo "Pushing $ZIP to itch.io..."
          butler push "$ZIP" \
            "${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:linux" \
            --userversion "${{ env.VERSION }}"

      - name: Summary
        run: |
          echo "## itch.io deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version **${{ env.VERSION }}** pushed to \`${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:linux\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View: https://${{ vars.ITCH_USER }}.itch.io/${{ vars.ITCH_GAME }}" >> "$GITHUB_STEP_SUMMARY"
